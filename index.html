    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "name": "CryptoCoffee",
            "url": "https://srpvpn.github.io/CryptoCoffee/",
            "description": "Open-source static crypto tipping pages with no backend and no platform fees."

            "@type": "SoftwareApplication",

            "description": "Self-hosted crypto tipping pages for Bitcoin, Ethereum, Solana and more.",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD"
            },
            "sameAs": "https://github.com/srpvpn/CryptoCoffee"
          }
        ]
      }
    </script>
    <script>
      // GitHub Pages SPA fallback:
      // restore real path from query generated by public/404.html.
      (function (l) {
        if (l.search && l.search.startsWith('?/')) {
          var decoded = l.search
            .slice(2)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          var newUrl = l.pathname.replace(/\/index\.html$/, '/') + decoded + l.hash;
          window.history.replaceState(null, '', newUrl);
        }
      })(window.location);
    </script>

    </div>
